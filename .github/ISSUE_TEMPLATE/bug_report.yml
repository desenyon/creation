name: Bug report
description: Report something broken in Creation
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. creation build ...\n2. ..."
  - type: input
    id: version
    attributes:
      label: Creation version
      placeholder: "0.6.0"
  - type: dropdown
    id: service
    attributes:
      label: Which service?
      options:
        - Account
        - Forge
        - Lens
        - Prism
        - Relay
        - Pulse
        - Studio / CLI
        - Other
